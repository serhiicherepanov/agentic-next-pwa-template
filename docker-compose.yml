name: agentic-template-prod

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:?required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?required} -d ${POSTGRES_DB:?required}"]
      interval: 5s
      timeout: 2s
      retries: 30
    restart: always

  app:
    build:
      context: .
      target: production
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_AUTO_MIGRATE: ${APP_AUTO_MIGRATE:-1}
    depends_on:
      db:
        condition: service_healthy
    restart: always
