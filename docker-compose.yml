# Default stack for local development. Brings up Postgres only;
# run the Next.js app on the host with `pnpm dev`.
#
#   docker compose --env-file .env.dev up -d --wait
#
# Production stacks live in docker-compose.prod.yml and docker-compose.dokploy.yml.
name: agentic-template-local

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic}
      POSTGRES_DB: ${POSTGRES_DB:-agentic}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentic} -d ${POSTGRES_DB:-agentic}"]
      interval: 2s
      timeout: 2s
      retries: 30
    restart: always

volumes:
  pgdata:
    external: true
    name: agentic-template-local_pgdata
