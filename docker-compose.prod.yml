# Self-hosted production stack: builds the app image, publishes it on a host
# port, and stores Postgres in a named external volume.
#
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
name: agentic-template-prod

include:
  - docker-compose.shared.yml

services:
  db:
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    ports:
      - "${APP_HTTP_PORT:-3080}:3000"

volumes:
  pgdata:
    external: true
    name: agentic-template-prod_pgdata
